<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <filter id="noise" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.80" numOctaves="4" stitchTiles="stitch" result="noiseOut"/>
    <feColorMatrix type="saturate" values="0" in="noiseOut"/>
  </filter>
  <rect width="200" height="200" filter="url(#noise)" opacity="0.20"/>
</svg>
